name: tests

on:
  push:
  pull_request:

jobs:
  pytest:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test dependencies
        run: python -m pip install -U pip pytest
      - name: Run tests
        run: python -m pytest tests/unit tests/integration -q
