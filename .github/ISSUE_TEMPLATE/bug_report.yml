name: Bug report
description: Report something that is not working in CodexDeck.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: CodexDeck version
      placeholder: "codexdeck --version"
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - Ubuntu
        - Other Linux
        - Other
    validations:
      required: true
  - type: input
    id: terminal
    attributes:
      label: Terminal
      placeholder: "Windows Terminal, PowerShell, GNOME Terminal, etc."
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include the command you ran and any relevant config.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

